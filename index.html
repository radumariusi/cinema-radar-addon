<!DOCTYPE html>
<html>
<head>
    <title>Configurare Cinema Radar</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f1a; color: white; text-align: center; padding: 20px; }
        .container { max-width: 600px; margin: 50px auto; background: #1a1a2e; padding: 40px; border-radius: 15px; border: 1px solid #303050; }
        h2 { color: #a277ff; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 8px; border: 1px solid #333; background: #0f0f1a; color: white; font-size: 16px; box-sizing: border-box; }
        button { background: #6200ee; color: white; border: none; padding: 15px; font-size: 16px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        button:hover { background: #3700b3; }
        #resultArea { margin-top: 30px; display: none; background: #0f0f1a; padding: 20px; border-radius: 8px; border: 1px dashed #6200ee; }
        #manifestUrl { word-break: break-all; font-family: monospace; color: #00e5ff; font-size: 14px; display: block; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Cinema & VOD Radar</h2>
        <p>Introdu cheia API TMDB pentru instalare:</p>
        
        <input type="text" id="tmdbKey" placeholder="Lipește cheia (ex: 3a2b...)">
        <button onclick="generateLink()">Generează Link</button>

        <div id="resultArea">
            <p>Link-ul tău curat HTTPS:</p>
            <span id="manifestUrl"></span>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button onclick="copyLink()" style="flex: 1; background: #444;">Copiază Link</button>
                <button onclick="installStremio()" style="flex: 1; background: #00c853;">Instalează (Stremio)</button>
            </div>
        </div>
    </div>

    <script>
        function generateLink() {
            const key = document.getElementById('tmdbKey').value.trim();
            if (!key) { alert("Introdu cheia TMDB!"); return; }

            const host = window.location.host;
            const protocol = window.location.protocol;
            
            // Link simplu, doar cu cheia directă
            const finalUrl = protocol + "//" + host + "/" + key + "/manifest.json";
            
            document.getElementById('manifestUrl').innerText = finalUrl;
            document.getElementById('resultArea').style.display = 'block';
        }

        function copyLink() {
            const url = document.getElementById('manifestUrl').innerText;
            navigator.clipboard.writeText(url).then(() => alert("Link copiat!"));
        }

        function installStremio() {
            const url = document.getElementById('manifestUrl').innerText;
            window.location.href = url.replace(/^https?:\/\//, 'stremio://');
        }
    </script>
</body>
</html>
